<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>まきちゃん ギャラリー — makimaki</title>
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Zen Maru Gothic',sans-serif;background:#fff;color:#1C1917}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:0;max-width:1200px;margin:0 auto}
.cell{aspect-ratio:1;display:flex;align-items:center;justify-content:center;padding:1.5rem}
.cell img{width:100%;height:100%;object-fit:contain}
@media(max-width:768px){.grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="grid">
  <div class="cell"><img src="sanrio_welcome.webp" alt="welcome"></div>
  <div class="cell"><img src="sanrio_heart.webp" alt="heart"></div>
  <div class="cell"><img src="sanrio_bye.webp" alt="bye"></div>
  <div class="cell"><img src="sanrio_cook.webp" alt="cook"></div>
  <div class="cell"><img src="sanrio_run.webp" alt="run"></div>
  <div class="cell"><img src="sanrio_sleep.webp" alt="sleep"></div>
  <div class="cell"><img src="sanrio_cry.webp" alt="cry"></div>
  <div class="cell"><img src="sanrio_think.webp" alt="think"></div>
</div>
</body>
</html>
