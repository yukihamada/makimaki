<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="/manifest-order.json">
<link rel="apple-touch-icon" href="/logo-dark.png">
<title>makimaki — ご注文</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Old+Mincho:wght@400;500&family=Zen+Kaku+Gothic+New:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--accent:#3A5A40;--accent-light:#5A7A60;--accent-bg:#EDF2EE;--bg:#FDFBF8;--fg:#1C1917;--muted:#78716C;--border:#E7E0D8;--white:#FFF;--serif:'Zen Old Mincho',serif;--sans:'Zen Kaku Gothic New',sans-serif}
html,body{height:100%;font-family:var(--sans);background:var(--bg);color:var(--fg);overflow:hidden}

.layout{display:grid;grid-template-columns:1fr 320px;height:100vh}

/* HEADER */
.header{display:flex;justify-content:space-between;align-items:center;padding:1rem 1.5rem;border-bottom:1px solid var(--border)}
.header-logo{font-family:var(--serif);font-size:1.2rem;font-weight:400;color:var(--accent)}
.header-step{font-size:.8rem;color:var(--muted)}

/* MAIN */
.main{overflow-y:auto;display:flex;flex-direction:column}
.main-content{flex:1;overflow-y:auto;padding:1.5rem}

/* STEP 1: Box */
.step{display:none}
.step.active{display:block}
.step-title{font-family:var(--serif);font-size:1.4rem;font-weight:400;text-align:center;margin-bottom:.5rem}
.step-sub{font-size:.8rem;color:var(--muted);text-align:center;margin-bottom:2rem}
.box-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.2rem;max-width:680px;margin:0 auto}
.box-card{text-align:center;padding:2.5rem 1rem;border:2px solid var(--border);background:var(--white);cursor:pointer;transition:all .25s;border-radius:8px}
.box-card:active{transform:scale(.96)}
.box-card.selected{border-color:var(--accent);background:var(--accent-bg)}
.box-dots{display:flex;justify-content:center;gap:6px;flex-wrap:wrap;margin-bottom:1rem;min-height:40px;align-items:center}
.box-dot{width:16px;height:16px;border-radius:50%;background:var(--accent);opacity:.6}
.box-card.selected .box-dot{opacity:1}
.box-title{font-family:var(--serif);font-size:1.4rem}
.box-sub{font-size:.75rem;color:var(--muted);margin-top:.3rem}

/* STEP 2: Pick items */
.pick-bar{display:flex;justify-content:space-between;align-items:center;padding:.8rem 1rem;background:var(--white);border-radius:8px;border:1px solid var(--border);margin-bottom:1.2rem}
.pick-bar-label{font-family:var(--serif);font-size:1rem}
.pick-bar-dots{display:flex;gap:5px}
.pick-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--border);transition:all .2s}
.pick-dot.filled{background:var(--accent);border-color:var(--accent)}
.pick-bar-count{font-size:.8rem;color:var(--muted);margin-left:.8rem}

.item-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:.8rem}
.item-card{padding:1.2rem .8rem;border:1px solid var(--border);background:var(--white);border-radius:8px;cursor:pointer;text-align:center;transition:all .2s;position:relative}
.item-card:active{transform:scale(.96)}
.item-card.picked{border-color:var(--accent);background:var(--accent-bg)}
.item-badge{position:absolute;top:-.4rem;right:-.4rem;min-width:24px;height:24px;padding:0 5px;background:var(--accent);color:#fff;border-radius:12px;font-size:.75rem;display:none;align-items:center;justify-content:center;font-weight:700}
.item-card.picked .item-badge{display:flex}
.item-name{font-family:var(--serif);font-size:1.05rem}
.item-en{font-size:.6rem;color:var(--muted);margin-top:.1rem}
.item-price{font-size:.85rem;color:var(--accent);margin-top:.5rem}

/* SIDEBAR */
.sidebar{background:var(--white);border-left:1px solid var(--border);display:flex;flex-direction:column}
.sidebar-title{padding:1.2rem 1.5rem;font-family:var(--serif);font-size:1.1rem;border-bottom:1px solid var(--border)}
.sidebar-scroll{flex:1;overflow-y:auto;padding:1rem}
.sb-box{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:.8rem 1rem;margin-bottom:.8rem}
.sb-box-head{font-size:.75rem;font-weight:700;color:var(--accent);margin-bottom:.4rem;display:flex;justify-content:space-between}
.sb-box-head button{background:none;border:none;color:#DC2626;font-size:.7rem;cursor:pointer}
.sb-box-item{font-size:.78rem;padding:.12rem 0;display:flex;justify-content:space-between}
.sb-box-item span:last-child{color:var(--muted)}
.sb-empty{text-align:center;padding:3rem 1rem;color:var(--muted);font-size:.85rem;line-height:1.8}
.sb-line{display:flex;justify-content:space-between;padding:.4rem 1.5rem;font-size:.82rem;border-top:1px solid var(--border)}
.sb-total{display:flex;justify-content:space-between;padding:.8rem 1.5rem;font-size:1.15rem;font-weight:700;border-top:2px solid var(--fg)}
.sb-actions{padding:1rem;display:flex;flex-direction:column;gap:.6rem}
.btn-primary{padding:1.1rem;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:1.1rem;font-weight:500;cursor:pointer;font-family:var(--sans);letter-spacing:.05em;transition:all .2s}
.btn-primary:active{background:var(--accent-light)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed}
.btn-secondary{padding:.7rem;background:var(--white);border:1px solid var(--border);border-radius:6px;font-size:.8rem;color:var(--muted);cursor:pointer;font-family:var(--sans)}
.btn-add{padding:.8rem;background:var(--white);border:2px dashed var(--border);border-radius:8px;font-size:.85rem;color:var(--muted);cursor:pointer;font-family:var(--sans);transition:all .2s;width:100%}
.btn-add:hover{border-color:var(--accent);color:var(--accent)}

/* SUCCESS */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;align-items:center;justify-content:center}
.overlay.show{display:flex}
.overlay-card{background:var(--white);padding:3rem 2.5rem;border-radius:16px;text-align:center;min-width:380px;max-width:90vw}
.overlay-card h2{font-family:var(--serif);font-size:1.6rem;color:var(--accent)}
.overlay-card .order-num{font-size:3.5rem;font-family:var(--serif);color:var(--accent);margin:.5rem 0;letter-spacing:.05em}
.overlay-card p{font-size:1rem;color:var(--muted);line-height:1.8;margin-bottom:1.5rem}
.overlay-card button{padding:1rem 3rem;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:1.1rem;cursor:pointer;font-family:var(--sans)}

@media(max-width:700px){
  .layout{grid-template-columns:1fr}
  .sidebar{display:none}
  .box-grid{grid-template-columns:1fr;max-width:280px}
  .item-grid{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>

<div class="layout">
  <div class="main">
    <div class="header">
      <div class="header-logo">makimaki</div>
      <div class="header-step" id="stepLabel">STEP 1: ボックスを選ぶ</div>
    </div>
    <div class="main-content">
      <!-- STEP 1 -->
      <div class="step active" id="step1">
        <div class="step-title">ボックスを選んでください</div>
        <div class="step-sub">お好みのサイズをタップ</div>
        <div class="box-grid">
          <div class="box-card" onclick="selBox(2,this)">
            <div class="box-dots"><span class="box-dot"></span><span class="box-dot"></span></div>
            <div class="box-title">2本</div>
            <div class="box-sub">ちょっとしたお楽しみに</div>
          </div>
          <div class="box-card" onclick="selBox(4,this)">
            <div class="box-dots"><span class="box-dot"></span><span class="box-dot"></span><span class="box-dot"></span><span class="box-dot"></span></div>
            <div class="box-title">4本</div>
            <div class="box-sub">一番人気</div>
          </div>
          <div class="box-card" onclick="selBox(6,this)">
            <div class="box-dots"><span class="box-dot"></span><span class="box-dot"></span><span class="box-dot"></span><span class="box-dot"></span><span class="box-dot"></span><span class="box-dot"></span></div>
            <div class="box-title">6本</div>
            <div class="box-sub">みんなでシェア</div>
          </div>
        </div>
      </div>

      <!-- STEP 2 -->
      <div class="step" id="step2">
        <div class="pick-bar">
          <div style="display:flex;align-items:center">
            <span class="pick-bar-label" id="pickLabel">4本 Box</span>
            <span class="pick-bar-count" id="pickCount">0 / 4</span>
          </div>
          <div class="pick-bar-dots" id="pickDots"></div>
        </div>
        <div class="item-grid" id="itemGrid"></div>
      </div>
    </div>
  </div>

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-title">ご注文内容</div>
    <div class="sidebar-scroll" id="sideScroll">
      <div class="sb-empty">ボックスサイズを<br>お選びください</div>
    </div>
    <div class="sb-line" id="sbSub" style="display:none"><span>小計</span><span id="valSub">¥0</span></div>
    <div class="sb-line" id="sbTax" style="display:none"><span>税(10%)+箱代</span><span id="valTax">¥0</span></div>
    <div class="sb-total" id="sbTotal" style="display:none"><span>合計</span><span id="valTotal">¥0</span></div>
    <div class="sb-actions">
      <button class="btn-primary" id="orderBtn" disabled onclick="submitSelfOrder()">レジでお会計する</button>
      <button class="btn-secondary" onclick="resetAll()">最初からやり直す</button>
    </div>
  </div>
</div>

<!-- SUCCESS -->
<div class="overlay" id="successOv">
  <div class="overlay-card">
    <h2>ご注文ありがとうございます</h2>
    <div class="order-num" id="ovNum">#0000</div>
    <p>この番号をレジでお伝えください。<br>巻きたてをお作りします。</p>
    <button onclick="closeSuccess()">次のお客様へ</button>
  </div>
</div>

<script>
const MENU=[
  {id:'akami',name:'Akami Tekka',jp:'赤身鉄火',price:1400},
  {id:'chutoro',name:'Chutoro Tekka',jp:'中とろ鉄火',price:1600},
  {id:'negitoro',name:'Negitoro',jp:'ネギトロ',price:1400},
  {id:'torotaku',name:'Torotaku',jp:'とろたく',price:1400},
  {id:'salmon',name:'Salmon',jp:'サーモン',price:900},
  {id:'salmon_cc',name:'Salmon CC',jp:'サーモンCC',price:900},
  {id:'ebimayo_p',name:'Ebi Mayo',jp:'エビマヨパクチー',price:800},
  {id:'ika_shiso',name:'Ika Shiso',jp:'いか大葉',price:800},
  {id:'nama_ebi',name:'Nama Ebi',jp:'生エビマヨ',price:900},
  {id:'kohada',name:'Kohada',jp:'小肌ガリ大葉',price:900},
  {id:'anakyu',name:'Anakyu',jp:'あなきゅう',price:900},
  {id:'mentai',name:'Mentai',jp:'明太きゅうり',price:700},
  {id:'tuna_mayo',name:'Tuna Mayo',jp:'ツナマヨ',price:700},
  {id:'ume_shiso',name:'Ume Shiso',jp:'梅しそきゅう',price:650},
  {id:'kappa',name:'Kappa',jp:'かっぱ',price:600},
  {id:'wasabi_kyu',name:'Wasabi Mayo',jp:'わさびマヨきゅう',price:600},
  {id:'natto',name:'Natto',jp:'納豆白ねぎ',price:600},
  {id:'ume_katsuo',name:'Ume Katsuo',jp:'梅かつお高菜',price:600},
  {id:'tamago_m',name:'Tamago Mayo',jp:'たまごマヨ',price:600},
  {id:'tamago_i',name:'Tamago Inari',jp:'たまごいなり',price:600},
  {id:'kanpyo',name:'Kanpyo',jp:'かんぴょう',price:600},
  {id:'oshinko',name:'Oshinko',jp:'おしんこ',price:500},
];

let boxes=[];
let curSize=0;
let curItems=[];

function selBox(size,el){
  document.querySelectorAll('.box-card').forEach(c=>c.classList.remove('selected'));
  el.classList.add('selected');
  curSize=size; curItems=[];
  document.getElementById('step1').classList.remove('active');
  document.getElementById('step2').classList.add('active');
  document.getElementById('stepLabel').textContent='STEP 2: 中身を選ぶ';
  renderPick(); updateSide();
}

function renderPick(){
  document.getElementById('pickLabel').textContent=curSize+'本 Box';
  document.getElementById('pickCount').textContent=curItems.length+' / '+curSize;
  let d='';for(let i=0;i<curSize;i++) d+=`<span class="pick-dot ${i<curItems.length?'filled':''}"></span>`;
  document.getElementById('pickDots').innerHTML=d;
  const om={};curItems.forEach((id,i)=>{if(!om[id])om[id]=[];om[id].push(i+1);});
  document.getElementById('itemGrid').innerHTML=MENU.map(m=>{
    const o=om[m.id]||[];
    return `<div class="item-card ${o.length?'picked':''}" onclick="pick('${m.id}')">
      <div class="item-badge">${o.join(',')}</div>
      <div class="item-name">${m.jp}</div>
      <div class="item-en">${m.name}</div>
      <div class="item-price">&yen;${m.price.toLocaleString()}</div>
    </div>`;
  }).join('');
}

function pick(id){
  const cnt=curItems.filter(x=>x===id).length;
  if(curItems.length>=curSize&&cnt>0){
    curItems.splice(curItems.lastIndexOf(id),1);
    renderPick();updateSide();return;
  }
  if(curItems.length>=curSize)return;
  curItems.push(id);
  renderPick();updateSide();
  if(curItems.length===curSize){
    setTimeout(()=>{
      boxes.push({size:curSize,items:[...curItems]});
      curSize=0;curItems=[];
      document.getElementById('step2').classList.remove('active');
      document.getElementById('step1').classList.add('active');
      document.getElementById('stepLabel').textContent='STEP 1: ボックスを選ぶ';
      document.querySelectorAll('.box-card').forEach(c=>c.classList.remove('selected'));
      updateSide();
    },250);
  }
}

function updateSide(){
  const sc=document.getElementById('sideScroll');
  const all=[...boxes];
  const ip=curSize>0?{size:curSize,items:[...curItems],ip:true}:null;

  if(!all.length&&!ip){
    sc.innerHTML='<div class="sb-empty">ボックスサイズを<br>お選びください</div>';
    ['sbSub','sbTax','sbTotal'].forEach(x=>document.getElementById(x).style.display='none');
    document.getElementById('orderBtn').disabled=true;
    return;
  }

  let h='';
  [...all,ip].filter(Boolean).forEach((b,i)=>{
    h+=`<div class="sb-box"><div class="sb-box-head"><span>Box #${i+1} (${b.size}本)${b.ip?' — 選択中':''}</span>${!b.ip?`<button onclick="delBox(${i})">取消</button>`:''}</div>`;
    b.items.forEach((id,j)=>{
      const m=MENU.find(x=>x.id===id);
      h+=`<div class="sb-box-item"><span>${j+1}. ${m?.jp||id}</span><span>&yen;${(m?.price||0).toLocaleString()}</span></div>`;
    });
    h+='</div>';
  });
  if(all.length>0&&!ip) h+=`<button class="btn-add" onclick="document.getElementById('step1').scrollIntoView({behavior:'smooth'})">+ もう1ボックス追加</button>`;
  sc.innerHTML=h;

  let sub=0;all.forEach(b=>b.items.forEach(id=>{sub+=MENU.find(m=>m.id===id)?.price||0;}));
  const tax=Math.floor(sub*0.1);
  const boxC=all.length*200;
  const total=sub+tax+boxC;
  document.getElementById('valSub').textContent='¥'+sub.toLocaleString();
  document.getElementById('valTax').textContent='¥'+(tax+boxC).toLocaleString();
  document.getElementById('valTotal').textContent='¥'+total.toLocaleString();
  document.getElementById('sbSub').style.display=all.length?'flex':'none';
  document.getElementById('sbTax').style.display=all.length?'flex':'none';
  document.getElementById('sbTotal').style.display=all.length?'flex':'none';
  document.getElementById('orderBtn').disabled=!all.length;
}

function delBox(i){boxes.splice(i,1);updateSide();}

function resetAll(){
  boxes=[];curSize=0;curItems=[];
  document.getElementById('step2').classList.remove('active');
  document.getElementById('step1').classList.add('active');
  document.getElementById('stepLabel').textContent='STEP 1: ボックスを選ぶ';
  document.querySelectorAll('.box-card').forEach(c=>c.classList.remove('selected'));
  updateSide();
}

async function submitSelfOrder(){
  const btn=document.getElementById('orderBtn');
  btn.disabled=true;btn.textContent='注文中...';
  // Flatten items
  const map={};
  boxes.forEach(b=>b.items.forEach(id=>{
    const m=MENU.find(x=>x.id===id);
    if(m){if(!map[id])map[id]={name:m.jp,price:m.price,qty:0};map[id].qty++;}
  }));
  const items=Object.values(map);
  const note='[SELF-ORDER] '+boxes.map((b,i)=>`Box#${i+1}(${b.size}本):${b.items.map(id=>MENU.find(m=>m.id===id)?.jp||id).join(',')}`).join(' / ');

  try{
    const res=await fetch('/api/orders',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({name:'店頭セルフ',phone:'',pickup_time:'店頭受取',items,note})
    });
    const data=await res.json();
    if(data.id){
      document.getElementById('ovNum').textContent='#'+data.id;
      document.getElementById('successOv').classList.add('show');
      resetAll();
    }else{alert('注文エラー');}
  }catch(e){alert('通信エラー');}
  btn.disabled=false;btn.textContent='レジでお会計する';
}

function closeSuccess(){
  document.getElementById('successOv').classList.remove('show');
}

// Auto-reset after 60s of inactivity on success screen
let resetTimer;
document.addEventListener('touchstart',()=>{clearTimeout(resetTimer);});
const origClose=closeSuccess;
closeSuccess=function(){origClose();};

updateSide();
</script>
</body>
</html>
