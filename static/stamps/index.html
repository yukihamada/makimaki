<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>まきちゃん LINEスタンプ</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Zen Maru Gothic',sans-serif;background:#FDFBF8;color:#1C1917}
.hero{text-align:center;padding:3rem 2rem 2rem;background:#3A5A40;color:#fff}
.hero h1{font-size:1.8rem;font-weight:500;margin-bottom:.3rem}
.hero p{font-size:.85rem;opacity:.7}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;max-width:800px;margin:2rem auto;padding:0 1.5rem}
.stamp{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.06);text-align:center;padding:.5rem}
.stamp img{width:100%;aspect-ratio:370/320;object-fit:contain}
.stamp p{font-size:.7rem;color:#78716C;padding:.3rem 0}
.info{max-width:600px;margin:2rem auto;padding:0 1.5rem 3rem;text-align:center;font-size:.85rem;color:#78716C;line-height:2}
.info a{color:#3A5A40;text-decoration:none;border-bottom:1px solid #3A5A40}
@media(max-width:600px){.grid{grid-template-columns:repeat(3,1fr);gap:.6rem}}
</style>
</head>
<body>
<div class="hero">
  <h1>まきちゃん LINEスタンプ</h1>
  <p>makimaki公式キャラクター — 全16種</p>
</div>
<div class="grid">
  <div class="stamp"><img src="01.png" alt="ありがとう"><p>ありがとう</p></div>
  <div class="stamp"><img src="02.png" alt="おはよう"><p>おはよう</p></div>
  <div class="stamp"><img src="03.png" alt="おつかれ!"><p>おつかれ!</p></div>
  <div class="stamp"><img src="04.png" alt="OK!"><p>OK!</p></div>
  <div class="stamp"><img src="05.png" alt="おいしい!"><p>おいしい!</p></div>
  <div class="stamp"><img src="06.png" alt="いただきます"><p>いただきます</p></div>
  <div class="stamp"><img src="07.png" alt="がんばれ!"><p>がんばれ!</p></div>
  <div class="stamp"><img src="08.png" alt="ごめんね"><p>ごめんね</p></div>
  <div class="stamp"><img src="09.png" alt="大好き!"><p>大好き!</p></div>
  <div class="stamp"><img src="10.png" alt="わーい!"><p>わーい!</p></div>
  <div class="stamp"><img src="11.png" alt="まかせて!"><p>まかせて!</p></div>
  <div class="stamp"><img src="12.png" alt="おやすみ"><p>おやすみ</p></div>
  <div class="stamp"><img src="13.png" alt="待ってて!"><p>待ってて!</p></div>
  <div class="stamp"><img src="14.png" alt="えーん"><p>えーん</p></div>
  <div class="stamp"><img src="15.png" alt="ぺこり"><p>ぺこり</p></div>
  <div class="stamp"><img src="16.png" alt="また来てね"><p>また来てね</p></div>
</div>
<div class="info">
  makimaki公式キャラクター「まきちゃん」のLINEスタンプです。<br>
  <a href="/">makimaki.tokyo</a> に戻る
</div>
</body>
</html>
