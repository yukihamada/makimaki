<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAKIMAKI DAYS — makimaki</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Zen Maru Gothic',sans-serif;background:#000;color:#fff;overflow:hidden;height:100vh;width:100vw}

.mv-bg{position:fixed;inset:0;background-size:cover;background-position:center;z-index:0}
.mv-overlay{position:fixed;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.25),rgba(0,0,0,.55));z-index:1}
.beat-flash{position:fixed;inset:0;z-index:1;background:rgba(58,90,64,.18);opacity:0;pointer-events:none;transition:opacity .08s}
.beat-flash.on{opacity:1}

.mv-content{position:fixed;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:5;text-align:center;padding:2rem}
.lyric{font-size:clamp(1.5rem,4.5vw,3rem);font-weight:700;letter-spacing:.08em;line-height:1.5;opacity:0;transform:translateY(24px);transition:all .5s cubic-bezier(.22,1,.36,1);max-width:750px;text-shadow:0 3px 30px rgba(0,0,0,.7)}
.lyric.active{opacity:1;transform:translateY(0)}
.lyric.fade{opacity:0;transform:translateY(-20px)}

/* MAKI-CHAN APNG */
.maki-chan{position:fixed;z-index:6;pointer-events:none;transition:all .6s cubic-bezier(.22,1,.36,1)}
.maki-chan img{width:100%;height:100%;object-fit:contain}
.maki-left{bottom:2rem;left:2rem;width:160px;height:160px;opacity:0;transform:translateX(-40px)}
.maki-left.show{opacity:1;transform:translateX(0)}
.maki-right{bottom:2rem;right:2rem;width:160px;height:160px;opacity:0;transform:translateX(40px)}
.maki-right.show{opacity:1;transform:translateX(0)}
.maki-center{top:50%;left:50%;width:220px;height:220px;transform:translate(-50%,-50%) scale(0);opacity:0;transition:all .4s cubic-bezier(.34,1.56,.64,1)}
.maki-center.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.maki-left.bounce{animation:bounce .35s ease}
.maki-right.bounce{animation:bounce .35s ease}
.maki-center.bounce.show{animation:bouncec .35s ease;transform:translate(-50%,-50%) scale(1)}
@keyframes bouncec{0%,100%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-50%,-50%) scale(1) translateY(-8px)}}

.mv-logo{position:fixed;top:1.5rem;left:50%;transform:translateX(-50%);z-index:10;transition:transform .15s}
.mv-logo svg{height:24px;overflow:visible}
.mv-logo circle{transition:transform .08s,fill .15s;transform-origin:center;transform-box:fill-box}

.visualizer{position:fixed;bottom:0;left:0;right:0;height:60px;z-index:3;display:flex;align-items:flex-end;justify-content:center;gap:2px;padding:0 15%;pointer-events:none}
.viz-bar{width:3px;background:rgba(58,90,64,.6);border-radius:2px 2px 0 0;min-height:2px}

.particles{position:fixed;inset:0;z-index:2;pointer-events:none;overflow:hidden}
.particle{position:absolute;border-radius:50%;animation:float linear infinite}
@keyframes float{0%{transform:translateY(100vh) scale(0);opacity:0}10%{opacity:1}90%{opacity:.3}100%{transform:translateY(-20vh) scale(1);opacity:0}}

.sushi-rain{position:fixed;inset:0;z-index:4;pointer-events:none;overflow:hidden}
.sushi-drop{position:absolute;animation:sushiFall linear forwards}
.sushi-drop img{width:100%;height:100%;object-fit:contain}
@keyframes sushiFall{0%{transform:translateY(-40px) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(360deg);opacity:0}}

.mv-progress{position:fixed;bottom:0;left:0;height:3px;background:linear-gradient(90deg,#3A5A40,#7CBA82);z-index:10;transition:width .3s linear}

.mv-cta{position:fixed;bottom:2.5rem;left:50%;transform:translateX(-50%);z-index:10;opacity:0;transition:all .8s;pointer-events:none}
.mv-cta.show{opacity:1;pointer-events:auto}
.mv-cta a{display:inline-block;padding:.9rem 3rem;background:#3A5A40;color:#fff;text-decoration:none;font-size:1rem;letter-spacing:.15em;border-radius:30px;transition:all .3s;box-shadow:0 4px 20px rgba(58,90,64,.3)}
.mv-cta a:hover{background:#2E4833;transform:translateY(-2px)}

.play-overlay{position:fixed;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:20;background:rgba(0,0,0,.75);cursor:pointer;transition:opacity .6s}
.play-overlay.hidden{opacity:0;pointer-events:none}
.play-maki{width:120px;height:120px;margin-bottom:1rem}
.play-maki img{width:100%;height:100%;object-fit:contain}
.play-btn{width:80px;height:80px;border:2px solid rgba(255,255,255,.4);border-radius:50%;display:flex;align-items:center;justify-content:center;transition:all .3s}
.play-btn:hover{border-color:#fff;transform:scale(1.1)}
.play-btn svg{width:28px;height:28px;fill:#fff;margin-left:4px}
.play-title{margin-top:1.5rem;font-size:1.5rem;font-weight:400;letter-spacing:.3em}
.play-sub{margin-top:.4rem;font-size:.7rem;opacity:.35;letter-spacing:.15em}

.mv-close{position:fixed;top:1.2rem;right:1.2rem;z-index:20;color:rgba(255,255,255,.4);font-size:1.3rem;cursor:pointer;text-decoration:none}
/* INFO TEXT */
.info-text{position:fixed;z-index:6;pointer-events:none;opacity:0;transition:all .8s cubic-bezier(.22,1,.36,1)}
.info-text.show{opacity:1}
.info-top{top:13%;left:50%;transform:translateX(-50%);text-align:center}
.info-bottom{bottom:13%;left:50%;transform:translateX(-50%);text-align:center}
.info-text h3{font-size:clamp(.6rem,1.2vw,.85rem);font-weight:300;letter-spacing:.3em;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:.4rem}
.info-text p{font-size:clamp(.85rem,2vw,1.2rem);font-weight:400;line-height:1.8;text-shadow:0 2px 15px rgba(0,0,0,.6)}

.mv-close:hover{color:#fff}

@media(max-width:600px){
  .maki-left,.maki-right{width:110px;height:110px;bottom:1rem}
  .maki-left{left:1rem}.maki-right{right:1rem}
  .maki-center{width:160px;height:160px}
}
</style>
</head>
<body>

<!-- SINGLE BG (no switching) -->
<div class="mv-bg" id="mvBg" style="background-image:url('/img1110.jpg')"></div>
<div class="mv-overlay"></div>
<div class="beat-flash" id="beatFlash"></div>
<div class="particles" id="particles"></div>
<div class="sushi-rain" id="sushiRain"></div>
<div class="visualizer" id="visualizer"></div>

<!-- MAKI-CHAN (APNG) -->
<div class="maki-chan maki-left" id="makiL"><img id="makiLI" alt=""></div>
<div class="maki-chan maki-right" id="makiR"><img id="makiRI" alt=""></div>
<div class="maki-chan maki-center" id="makiC"><img id="makiCI" alt=""></div>

<!-- INFO TEXT -->
<div class="info-text info-top" id="infoTop"></div>
<div class="info-text info-bottom" id="infoBottom"></div>

<div class="mv-logo"><svg viewBox="0 0 120 80" fill="white"><circle cx="20" cy="20" r="14"/><circle cx="60" cy="20" r="14"/><circle cx="100" cy="20" r="14"/><circle cx="20" cy="60" r="14"/><circle cx="60" cy="60" r="14"/><circle cx="100" cy="60" r="14"/></svg></div>
<a href="/" class="mv-close">&times;</a>

<div class="mv-content"><div class="lyric" id="lyric"></div></div>
<div class="mv-progress" id="progress"></div>
<div class="mv-cta" id="cta"><a href="/#menu">オーダーする</a></div>

<div class="play-overlay" id="playOverlay" onclick="startMV()">
  <div class="play-maki"><img src="/stamps/animated/16.apng" alt="まきちゃん"></div>
  <div class="play-btn"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>
  <div class="play-title">MAKIMAKI DAYS</div>
  <div class="play-sub">麻布十番 細巻き専門店</div>
</div>

<audio id="audio" preload="auto" src="/makimaki-days.mp3"></audio>

<script>
const A = '/stamps/animated/';
const CLIPS = {
  wave:A+'16.apng', jump:A+'10.apng', love:A+'09.apng', bow:A+'01.apng',
  cook:A+'05.apng', cheer:A+'07.apng', run:A+'13.apng', cry:A+'14.apng',
  eat:A+'06.apng', sleep:A+'12.apng',
};

// BG images - preload
const BGS = ['/img1110.jpg','/img1111.jpg','/img1108.jpg','/img1113.jpg','/img1114.jpg','/img1107.jpg','/img1109.jpg','/img1117.jpg','/img1112.jpg'];
BGS.forEach(s => { const i = new Image(); i.src = s; });

const TIMELINE = [
  {t:0,    lyric:"Makimaki!", bg:0, maki:{p:'C',c:'jump'}, sushi:true},
  {t:2.6,  lyric:"Let's go!", bg:0, maki:{p:'L',c:'run'},
   info:{pos:'top', html:'<h3>Azabu-Juban, Tokyo</h3><p>麻布十番の細巻き専門店</p>'}},
  {t:5,    lyric:"Makimaki, Let's go!", bg:4, maki:{p:'R',c:'cheer'}, sushi:true, hideInfo:true,
   info:{pos:'bottom', html:'<p>鮨めい乃のMaiがプロデュース</p>'}},
  {t:8,    lyric:"", bg:1, hideMaki:true, hideInfo:true},
  {t:14.2, lyric:"十番の街　光るロゴ", bg:0, maki:{p:'R',c:'wave'},
   info:{pos:'top', html:'<h3>Location</h3><p>麻布十番駅 徒歩1分</p>'}},
  {t:16.7, lyric:"一本ずつ　巻くのがプロ", bg:4, maki:{p:'L',c:'cook'}, hideInfo:true,
   info:{pos:'bottom', html:'<p>一本ずつ、心を込めて巻き上げます</p>'}},
  {t:19.2, lyric:"旬の素材　光る彩り", bg:2, maki:{p:'R',c:'love'}, hideInfo:true,
   info:{pos:'top', html:'<h3>Ingredients</h3><p>山幸の国産本マグロを使用</p>'}},
  {t:21.6, lyric:"手にするだけで　心踊り", bg:6, maki:{p:'L',c:'jump'}, hideInfo:true},
  {t:24.9, lyric:"MAKIMAKI!　どこでもパクり", bg:3, maki:{p:'C',c:'jump'}, sushi:true,
   info:{pos:'top', html:'<h3>Takeout</h3><p>どこでも手軽に、美味しいお鮨を</p>'}},
  {t:27.3, lyric:"MAKIMAKI!　笑顔がキラり", bg:7, maki:{p:'L',c:'cheer'}, sushi:true, hideInfo:true},
  {t:29.8, lyric:"お家も外も　幸せガブリ", bg:1, maki:{p:'R',c:'love'},
   info:{pos:'bottom', html:'<p>2本Box / 4本Box / 6本Box</p>'}},
  {t:32.3, lyric:"最高な時間を　巻き込んじゃえ！", bg:5, maki:{p:'C',c:'cheer'}, sushi:true, hideInfo:true},
  {t:37.4, lyric:"It's a MAKIMAKI DAY!", bg:0, maki:{p:'C',c:'jump'}, sushi:true,
   info:{pos:'top', html:'<h3>Online Order</h3><p>makimaki.tokyo</p>'}},
  {t:41,   lyric:"", bg:4, hideMaki:true, hideInfo:true},
  {t:43.1, lyric:"できたてをどうぞ。", bg:6, maki:{p:'R',c:'bow'},
   info:{pos:'top', html:'<h3>Open</h3><p>11:00 − 18:00</p>'}},
  {t:47,   lyric:"", bg:8, hideMaki:true, hideInfo:true},
  {t:48.7, lyric:"Makimaki!", bg:0, maki:{p:'C',c:'wave'},
   info:{pos:'bottom', html:'<p>@maki_maki_tokyo</p>'}},
  {t:52,   lyric:"", bg:4, cta:true, maki:{p:'L',c:'wave'}, hideInfo:true},
];

const audio = document.getElementById('audio');
const lyricEl = document.getElementById('lyric');
const bgEl = document.getElementById('mvBg');
let currentIdx = -1;
let analyser, dataArray, vizBars = [], prevBass = 0;

function showMaki(pos, clip) {
  ['L','R','C'].forEach(p => document.getElementById('maki'+p).classList.remove('show'));
  const el = document.getElementById('maki'+pos);
  const img = document.getElementById('maki'+pos+'I');
  // Force APNG restart by adding cache-bust
  img.src = CLIPS[clip] + '?' + Date.now();
  requestAnimationFrame(() => el.classList.add('show'));
}
function hideAllMaki() { ['L','R','C'].forEach(p => document.getElementById('maki'+p).classList.remove('show')); }

function showInfo(pos, html) {
  const el = document.getElementById(pos === 'top' ? 'infoTop' : 'infoBottom');
  el.innerHTML = html; el.classList.add('show');
}
function hideAllInfo() {
  document.getElementById('infoTop').classList.remove('show');
  document.getElementById('infoBottom').classList.remove('show');
}

const SUSHI_IMGS = ['akami','chutoro','negitoro','torotaku','salmon','salmon_cc','kappa','mentai','tamago_m','oshinko','anakyu','ebimayo_p'];
function sushiRain() {
  const c = document.getElementById('sushiRain');
  for (let i = 0; i < 10; i++) {
    const d = document.createElement('div'); d.className = 'sushi-drop';
    const id = SUSHI_IMGS[Math.floor(Math.random()*SUSHI_IMGS.length)];
    const size = 30 + Math.random()*25;
    d.innerHTML = `<img src="/menu/${id}.webp" alt="">`;
    d.style.cssText = `left:${Math.random()*100}%;width:${size}px;height:${size}px;animation-duration:${2+Math.random()*2}s;animation-delay:${Math.random()*.8}s`;
    c.appendChild(d); setTimeout(() => d.remove(), 4000);
  }
}

function spawnParticle() {
  const el = document.createElement('div'); el.className = 'particle';
  const s = 2+Math.random()*5, d = 5+Math.random()*5;
  el.style.cssText = `left:${Math.random()*100}%;width:${s}px;height:${s}px;background:rgba(${Math.random()>.5?'58,90,64':'255,255,255'},${.15+Math.random()*.15});animation-duration:${d}s`;
  document.getElementById('particles').appendChild(el);
  setTimeout(() => el.remove(), (d+1)*1000);
}

function initViz() {
  const ctx = new (window.AudioContext||window.webkitAudioContext)();
  const src = ctx.createMediaElementSource(audio);
  analyser = ctx.createAnalyser(); analyser.fftSize = 128;
  src.connect(analyser); analyser.connect(ctx.destination);
  dataArray = new Uint8Array(analyser.frequencyBinCount);
  const v = document.getElementById('visualizer');
  for (let i = 0; i < 40; i++) { const b = document.createElement('div'); b.className = 'viz-bar'; v.appendChild(b); vizBars.push(b); }
}

let pInt;
function startMV() {
  document.getElementById('playOverlay').classList.add('hidden');
  initViz(); audio.play();
  pInt = setInterval(spawnParticle, 900);
  requestAnimationFrame(tick);
}

function tick() {
  if (audio.paused && audio.currentTime > 0) return;
  const t = audio.currentTime;
  if (audio.duration) document.getElementById('progress').style.width = (t/audio.duration*100)+'%';

  if (analyser) {
    analyser.getByteFrequencyData(dataArray);
    const step = Math.floor(dataArray.length/40);
    for (let i = 0; i < 40; i++) {
      const v = dataArray[i*step]||0;
      vizBars[i].style.height = (v/255*50+2)+'px';
      vizBars[i].style.background = `rgba(58,90,64,${.3+(v/255)*.4})`;
    }
    // Logo
    const dots = document.querySelectorAll('.mv-logo circle');
    [0,4,8,16,24,32].forEach((b,i) => {
      const v = dataArray[b]||0;
      dots[i].style.transform = `scale(${.7+(v/255)*.5}) translateY(${-(v/255)*5}px)`;
      dots[i].style.fill = v>200?'#7CBA82':v>150?'#B8926A':'white';
    });
    // Beat
    const bass = (dataArray[0]+dataArray[1]+dataArray[2])/3;
    if (bass > 170 && bass-prevBass > 30) {
      document.getElementById('beatFlash').classList.add('on');
      setTimeout(() => document.getElementById('beatFlash').classList.remove('on'), 90);
      document.querySelector('.mv-logo').style.transform = 'translateX(-50%) scale(1.12)';
      setTimeout(() => document.querySelector('.mv-logo').style.transform = 'translateX(-50%) scale(1)', 120);
      ['L','R','C'].forEach(p => {
        const el = document.getElementById('maki'+p);
        if (el.classList.contains('show')) { el.classList.remove('bounce'); void el.offsetWidth; el.classList.add('bounce'); }
      });
    }
    prevBass = bass;
  }

  let idx = -1;
  for (let i = TIMELINE.length-1; i >= 0; i--) { if (t >= TIMELINE[i].t) { idx = i; break; } }

  if (idx !== currentIdx && idx >= 0) {
    currentIdx = idx;
    const ev = TIMELINE[idx];
    // Lyric
    lyricEl.classList.remove('active'); lyricEl.classList.add('fade');
    setTimeout(() => { lyricEl.textContent = ev.lyric||''; lyricEl.classList.remove('fade'); if(ev.lyric) lyricEl.classList.add('active'); }, 200);
    // BG - smooth crossfade via CSS transition
    if (ev.bg !== undefined) bgEl.style.backgroundImage = `url('${BGS[ev.bg % BGS.length]}')`;
    // Maki
    if (ev.hideMaki) hideAllMaki();
    else if (ev.maki) showMaki(ev.maki.p, ev.maki.c);
    // Info
    if (ev.hideInfo) hideAllInfo();
    if (ev.info) showInfo(ev.info.pos, ev.info.html);
    // Sushi
    if (ev.sushi) sushiRain();
    // Particles burst
    if (ev.lyric && ev.lyric.includes('MAKIMAKI')) { for(let i=0;i<5;i++) spawnParticle(); }
    if (ev.cta) document.getElementById('cta').classList.add('show');
  }
  requestAnimationFrame(tick);
}

audio.addEventListener('ended', () => {
  clearInterval(pInt);
  document.getElementById('cta').classList.add('show');
  showMaki('C','wave');
  showInfo('top','<h3>makimaki</h3><p>麻布十番の細巻き専門テイクアウト店</p>');
  lyricEl.classList.remove('active');
  setTimeout(() => { lyricEl.textContent = 'また来てね♪'; lyricEl.classList.add('active'); }, 500);
});
</script>
</body>
</html>
