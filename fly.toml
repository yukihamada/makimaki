app = 'makimaki'
primary_region = 'nrt'

[build]

[env]
  DB_PATH = '/data/makimaki.db'

[mounts]
  source = 'makimaki_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
