name: Claude Code Auto-Fix

on:
  issues:
    types: [opened, labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  claude-fix:
    if: contains(github.event.issue.labels.*.name, 'fix-request')
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run Claude Code
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # Extract issue body as the fix instruction
          ISSUE_BODY=$(gh issue view ${{ github.event.issue.number }} --json body -q .body)

          # Run Claude Code in non-interactive mode
          claude -p "あなたはmakimakiの寿司テイクアウト店のWebサイト修正担当です。
          以下の修正依頼を実装してください。修正はstatic/フォルダのHTMLファイルかsrc/main.rsのみ。
          .envや機密情報は絶対に変更しないでください。

          修正依頼:
          $ISSUE_BODY

          修正後、変更したファイルの一覧と変更内容の要約を出力してください。" \
          --allowedTools "Read,Write,Edit,Glob,Grep,Bash(git diff)" \
          --max-turns 20

      - name: Create PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="fix/issue-${{ github.event.issue.number }}"
          git checkout -b "$BRANCH"
          git add -A

          # Check if there are changes
          if git diff --cached --quiet; then
            echo "No changes made"
            gh issue comment ${{ github.event.issue.number }} --body "変更なし — 修正対象が見つかりませんでした。"
            exit 0
          fi

          git config user.name "Claude Code"
          git config user.email "noreply@anthropic.com"
          git commit -m "fix: #${{ github.event.issue.number }} $(gh issue view ${{ github.event.issue.number }} --json title -q .title)"
          git push origin "$BRANCH"

          PR_URL=$(gh pr create \
            --title "fix: #${{ github.event.issue.number }} $(gh issue view ${{ github.event.issue.number }} --json title -q .title)" \
            --body "## 修正依頼 #${{ github.event.issue.number }}

          $(gh issue view ${{ github.event.issue.number }} --json body -q .body)

          ---
          Generated by Claude Code" \
            --base master \
            --head "$BRANCH")

          echo "PR created: $PR_URL"
          gh issue comment ${{ github.event.issue.number }} --body "PR作成しました: $PR_URL"

  auto-deploy:
    needs: claude-fix
    if: success()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          # Only deploy after PR is merged (triggered separately)
          echo "Deploy will happen after PR merge via separate workflow"
